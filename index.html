/* ── LUNAR DATE UTIL ────────────────────────────────────────── */
function toLunar(date){
  // Simple Gregorian to Lunar Vietnamese (approximate)
  const lunarInfo=[0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06aa0,0x0a6b6,0x056a0,0x02b60,0x09177,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0];
  function leapMonth(y){return lunarInfo[y-1900]&0xf;}
  function leapDays(y){return leapMonth(y)?((lunarInfo[y-1900]&0x10000)?30:29):0;}
  function monthDays(y,m){return (lunarInfo[y-1900]&(0x10000>>m))?30:29;}
  function yearDays(y){let s=348;for(let i=0x8000;i>0x8;i>>=1){if(lunarInfo[y-1900]&i) s+=1;}return s+leapDays(y);}
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  const offset=(Date.UTC(y,m-1,d)-Date.UTC(1900,0,31))/86400000;
  let i,temp=0,leap=0,month,day,year=1900;
  for(i=1900;i<2100&&temp<offset;i++){temp+=yearDays(i);if(temp<offset) year=i;}
  if(temp>=offset) temp-=yearDays(--year);
  const daysOff=offset-temp;
  const leapM=leapMonth(year);
  let lm=false;
  for(i=1;i<=12&&daysOff>0;i++){
    if(leapM>0&&i===(leapM+1)&&!lm){--i;lm=true;temp=leapDays(year);}
    else temp=monthDays(year,i);
    if(lm&&i===(leapM+1)) lm=false;
    temp-=1; // subtract to correctly accumulate
  }
  month=i-1; day=daysOff-(offset-daysOff)+1; // simplified
  // Use simpler approach
  return {y:year,m:month,d:day};
}
function getLunarDate(){
  const now=new Date();
  // Approximate: offset by known reference
  // 2026-06-10 = approx 15/4 AL - just show formatted date
  const ref=new Date(2026,4,26); // 2026-05-26 = 1/4 AL (approx)
  const diff=Math.floor((now-ref)/86400000);
  const lunarMonths=[29,30,29,30,29,30,29,30,29,30,29,30];
  let m=4,d=1+diff;
  while(d>lunarMonths[m-4%12]){d-=lunarMonths[m-4%12];m++;}
  return `${d}/${m} ÂL`;
}

    try{const r=await fetch(`${url}?action=${action}&${new URLSearchParams(params)}`);return r.json();}
    catch(e){return{error:e.message};}

// ── WRITE ───────────────────────────────────────────────────
function doPost(e) {
  initSheets();
  const ss   = SpreadsheetApp.getActiveSpreadsheet();
  const body = JSON.parse(e.postData.contents);
  const act  = body.action;
  const res  = {ok:false};

  try {
    // ── CREATE ORDER ─────────────────────────────────────
    if (act === 'createOrder') {
      ss.getSheetByName('DonHang').appendRow([
        body.id, body.maKH, body.tenKH, body.ngay,
        body.trangThai, Number(body.tongTien)||0, Number(body.tongVon)||0
      ]);
      (body.items||[]).forEach(it =>
        ss.getSheetByName('ChiTietDon').appendRow([
          body.id, String(it.maSP||''), String(it.ten||''),
          Number(it.sl)||0, Number(it.gia)||0, Number(it.von)||0,
          String(it.nhom||''), String(it.ghiChu||'')
        ])
      );
      res.ok = true;

    // ── UPDATE ORDER (sửa đơn — xoá cũ, thêm lại cùng ID) ───
    } else if (act === 'updateOrder') {
      const oh = ss.getSheetByName('DonHang');
      const cd = ss.getSheetByName('ChiTietDon');
      const cn = ss.getSheetByName('CongNo');

      // 1. Xoá DonHang cũ
      const hr = oh.getDataRange().getValues();
      for (let i = hr.length - 1; i >= 1; i--) {
        if (String(hr[i][0]) === String(body.id)) { oh.deleteRow(i+1); break; }
      }
      // 2. Xoá ChiTietDon cũ
      const cr = cd.getDataRange().getValues();
      for (let i = cr.length - 1; i >= 1; i--) {
        if (String(cr[i][0]) === String(body.id)) cd.deleteRow(i+1);
      }
      // 3. Ghi DonHang mới
      oh.appendRow([
        body.id, body.maKH, body.tenKH, body.ngay,
        body.trangThai, Number(body.tongTien)||0, Number(body.tongVon)||0
      ]);
      // 4. Ghi ChiTietDon mới
      (body.items||[]).forEach(it =>
        cd.appendRow([
          body.id, String(it.maSP||''), String(it.ten||''),
          Number(it.sl)||0, Number(it.gia)||0, Number(it.von)||0,
          String(it.nhom||''), String(it.ghiChu||'')
        ])
      );
      // 5. UPDATE CongNo SET soTien WHERE maDon (cột H) = orderId
      if (cn && body.maKH && body.maKH !== 'le') {
        const orderId = String(body.id).trim();
        const cnData = cn.getDataRange().getValues();
        let foundRow = -1;
        for (let i = 1; i < cnData.length; i++) {
          if (String(cnData[i][7]||'').trim() === orderId) { foundRow = i; break; }
        }
        if (foundRow >= 0) {
          cn.getRange(foundRow + 1, 4).setValue(Number(body.tongTien)||0);
          cn.getRange(foundRow + 1, 7).setValue('Sua don ' + orderId);
        } else if (body.trangThai === 'done') {
          cn.appendRow([
            body.newDebtId||('CN'+Date.now()),
            body.maKH, body.tenKH,
            Number(body.tongTien)||0, 'no',
            new Date().toISOString(), orderId, orderId
          ]);
        }
      }
      res.ok = true;

        } else if (act === 'approveOrder') {
      const sh = ss.getSheetByName('DonHang');
      const rows = sh.getDataRange().getValues();
      let orderRow = null;
      for (let i = 1; i < rows.length; i++) {
        if (String(rows[i][0]) === String(body.id)) {
          sh.getRange(i+1, 5).setValue('done');
          orderRow = rows[i]; break;
        }
      }
      // Tạo CongNo khi duyệt đơn (maDon = body.id)
      if (body.maKH && body.maKH !== 'le') {
        const cn = ss.getSheetByName('CongNo');
        if (cn) cn.appendRow([
          body.debtId || ('CN'+Date.now()),
          body.maKH, body.tenKH||'',
          Number(body.tongTien)||Number(orderRow&&orderRow[5])||0,
          'no', new Date().toISOString(),
          'Duyệt ' + body.id, body.id
        ]);
      }
      res.ok = true;

    // ── ADD DEBT (ghi nợ / thu tiền) ─────────────────────
    } else if (act === 'addDebt') {
      // ghiChu đã có mã đơn ("BH123" hoặc "Bán BH123") → lấy từ cuối làm maDon
      const ghiChuParts = String(body.ghiChu||'').trim().split(/\s+/);
      const maDon = ghiChuParts[ghiChuParts.length - 1] || '';
      ss.getSheetByName('CongNo').appendRow([
        body.id,                // A: id
        body.maKH,              // B: maKH
        body.tenKH,             // C: tenKH
        Number(body.soTien)||0, // D: soTien
        body.loai,              // E: loai
        body.ngay,              // F: ngay
        body.ghiChu||'',        // G: ghiChu (giữ nguyên)
        maDon                   // H: maDon = last word của ghiChu
      ]);
      res.ok = true;

        } else if (act === 'approveOrder') {
      const sh = ss.getSheetByName('DonHang');
      const rows = sh.getDataRange().getValues();
      let orderRow = null;
      for (let i = 1; i < rows.length; i++) {
        if (String(rows[i][0]) === String(body.id)) {
          sh.getRange(i+1, 5).setValue('done');
          orderRow = rows[i]; break;
        }
      }
      // Tạo CongNo khi duyệt đơn (maDon = body.id)
      if (body.maKH && body.maKH !== 'le') {
        const cn = ss.getSheetByName('CongNo');
        if (cn) cn.appendRow([
          body.debtId || ('CN'+Date.now()),
          body.maKH, body.tenKH||'',
          Number(body.tongTien)||Number(orderRow&&orderRow[5])||0,
          'no', new Date().toISOString(),
          'Duyệt ' + body.id, body.id
        ]);
      }
      res.ok = true;

    // ── ADD DEBT (ghi nợ / thu tiền) ─────────────────────
    } else if (act === 'addDebt') {
      // maDon: dùng giá trị được gửi, hoặc tự trích từ ghiChu ("Bán BH123" → "BH123")
      const maDon = body.maDon ||
        (body.ghiChu ? body.ghiChu.trim().split(/\s+/).pop() : '');
      ss.getSheetByName('CongNo').appendRow([
        body.id, body.maKH, body.tenKH,
        Number(body.soTien)||0, body.loai, body.ngay, body.ghiChu||'', maDon
      ]);
      res.ok = true;

    // ── ADD CUSTOMER ──────────────────────────────────────
    } else if (act === 'addCustomer') {
      ss.getSheetByName('TaiKhoan').appendRow([
        body.id, body.username, body.password,
        body.ten, body.loai, body.sdt||'', body.diaChi||'', body.avatar||''
      ]);
      res.ok = true;

    // ── UPDATE USER (profile / avatar) ───────────────────
    } else if (act === 'updateUser') {
      const sh = ss.getSheetByName('TaiKhoan');
      const rows = sh.getDataRange().getValues();
      for (let i = 1; i < rows.length; i++) {
        if (String(rows[i][0]) === String(body.id)) {
          if (body.ten)    sh.getRange(i+1, 4).setValue(body.ten);
          if (body.sdt)    sh.getRange(i+1, 6).setValue(body.sdt);
          if (body.avatar !== undefined) sh.getRange(i+1, 8).setValue(body.avatar||'');
          break;
        }
      }
      res.ok = true;

    } else {
      res.error = 'Unknown action: ' + act;
    }

  } catch(err) {
    res.error = err.message;
  }

  return ContentService
    .createTextOutput(JSON.stringify(res))
    .setMimeType(ContentService.MimeType.JSON);
}

      id:r[0],ten:r[1],gia:+r[2]||0,von:+r[3]||0,nhom:r[4]||'Khác',nhan:r[5]||''
    }));
  }
  else if (act === 'getDonHang') {
    const orders = sheet2arr(ss,'DonHang').map(r => ({
      id:r[0],maKH:r[1],tenKH:r[2],ngay:new Date(r[3]).toISOString(),
      trangThai:r[4],tongTien:+r[5]||0,tongVon:+r[6]||0,items:[]
    }));
    const details = sheet2arr(ss,'ChiTietDon');
    orders.forEach(o => {
      o.items = details.filter(d=>d[0]===o.id).map(d=>({
        maSP:d[1],ten:d[2],sl:+d[3]||0,gia:+d[4]||0,von:+d[5]||0,nhom:d[6]||''
      }));
    });
    result.data = orders;
  }
  else if (act === 'getCongNo') {
    result.data = sheet2arr(ss,'CongNo').map(r => ({
      id:r[0],maKH:r[1],tenKH:r[2],soTien:+r[3]||0,loai:r[4],
      ngay:new Date(r[5]).toISOString(),ghiChu:r[6]||'',maDon:r[7]||''
    }));
  }

  return json(result);
}

// ── WRITE ───────────────────────────────────────────────────
function doPost(e) {
  try {
  const ss   = SpreadsheetApp.getActiveSpreadsheet();
  const body = JSON.parse(e.postData.contents);
  const act  = body.action;

  if (act === 'createOrder') {
    ss.getSheetByName('DonHang').appendRow([
      body.id,body.maKH,body.tenKH,body.ngay,body.trangThai,body.tongTien,body.tongVon
    ]);
    body.items.forEach(it =>
      ss.getSheetByName('ChiTietDon').appendRow([
        body.id, String(it.maSP||''), String(it.ten||''), Number(it.sl)||0,
        Number(it.gia)||0, Number(it.von)||0, String(it.nhom||''), String(it.ghiChu||'')
      ])
    );
  }
  else if (act === 'approveOrder') {
    const sh = ss.getSheetByName('DonHang');
    findAndUpdate(sh, body.id, 5, 'done');
  }
  else if (act === 'addDebt') {
    const sh = ss.getSheetByName('CongNo');
    if(!sh) throw new Error('Sheet CongNo không tồn tại. Hãy chạy initializeSheets()');
    sh.appendRow([
      body.id, body.maKH, body.tenKH,
      Number(body.soTien)||0,
      body.loai, body.ngay, body.maDon||''
    ]);
  }
  else if (act === 'updateOrder') {
    // Cập nhật đơn cũ: xóa dòng cũ + append lại (cùng ID)
    const oh=ss.getSheetByName('DonHang'); const cd=ss.getSheetByName('ChiTietDon');
    const hr=oh.getDataRange().getValues();
    for(let i=hr.length-1;i>=1;i--){if(String(hr[i][0])===String(body.id)){oh.deleteRow(i+1);break;}}
    const cr=cd.getDataRange().getValues();
    for(let i=cr.length-1;i>=1;i--){if(String(cr[i][0])===String(body.id)) cd.deleteRow(i+1);}
    oh.appendRow([body.id,body.maKH,body.tenKH,body.ngay,body.trangThai,Number(body.tongTien)||0,Number(body.tongVon)||0]);
    (body.items||[]).forEach(it=>cd.appendRow([body.id,it.maSP,it.ten,it.sl,it.gia,it.von||0,it.nhom||'',it.ghiChu||'']));
    result.ok=true;
  }
  else if (act === 'cancelOrder') {
    // Xóa khỏi DonHang
    const oh = ss.getSheetByName('DonHang');
    const hr = oh.getDataRange().getValues();
    for(let i=hr.length-1;i>=1;i--){ if(String(hr[i][0])===String(body.id)){ oh.deleteRow(i+1); break; } }
    // Xóa khỏi ChiTietDon
    const cd = ss.getSheetByName('ChiTietDon');
    const cr = cd.getDataRange().getValues();
    for(let i=cr.length-1;i>=1;i--){ if(String(cr[i][0])===String(body.id)) cd.deleteRow(i+1); }
    // Đảo ngược công nợ nếu đơn đã giao
    if(body.reversDebt && body.maKH && body.maKH!=='le'){
      ss.getSheetByName('CongNo').appendRow([
        body.debtId||('CN'+Date.now()), body.maKH, body.tenKH,
        Number(body.tongTien)||0, 'thu', new Date().toISOString(), 'Huỷ đơn '+body.id
      ]);
    }
    result.ok=true;
  }
  else if (act === 'addCustomer') {
    ss.getSheetByName('TaiKhoan').appendRow([
      body.id,body.username,body.password,body.ten,body.loai,body.sdt||'',body.diaChi||'',body.avatar||''
    ]);
  }
  else if (act === 'addProduct') {
    ss.getSheetByName('SanPham').appendRow([
      body.id,body.ten,body.gia,body.von,body.nhom||''
    ]);
  }
  else if (act === 'updateUser') {
    const sh = ss.getSheetByName('TaiKhoan');
    const rows = sh.getDataRange().getValues();
    for(let i=1;i<rows.length;i++){
      if(rows[i][0]===body.id){
        if(body.ten!==undefined) sh.getRange(i+1,4).setValue(body.ten||rows[i][3]);
        if(body.sdt!==undefined) sh.getRange(i+1,6).setValue(body.sdt||rows[i][5]);
        if(body.avatar!==undefined) sh.getRange(i+1,8).setValue(body.avatar||'');
        break;
      }
    }
  }

  return json({ok:true});
  } catch(err) {
    return json({error: err.toString(), stack: err.stack});
  }
}

function setup() {
  initSheets();
  SpreadsheetApp.getUi().alert('✅ Đã tạo đầy đủ các sheet!');
}

function sheet2arr(ss, name) {
  const sh = ss.getSheetByName(name);
  if (!sh || sh.getLastRow() <= 1) return [];
  return sh.getRange(2,1,sh.getLastRow()-1,sh.getLastColumn()).getValues()
    .filter(r => r[0] !== '' && r[0] !== null);
}

function findAndUpdate(sh, id, col, value) {
  const rows = sh.getDataRange().getValues();
  for (let i=1; i<rows.length; i++) {
    if (String(rows[i][0])===String(id)) {
      sh.getRange(i+1, col).setValue(value);
      break;
    }
  }
}

function json(data) {
  return ContentService
    .createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

const AVATAR_COLORS=['#3B82F6','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#F97316','#EF4444','#14B8A6','#84CC16'];

function getAvatarColor(id=''){
  let h=0; for(let ch of String(id)) h=(h*31+ch.charCodeAt(0))%AVATAR_COLORS.length;
  return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];
}
function getInitials(ten=''){
  return (ten||'?').split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?';

// Resize image to square, return base64 JPEG
function resizeImage(file, size=120){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=size; canvas.height=size;
        const ctx=canvas.getContext('2d');
        const min=Math.min(img.width,img.height);
        const sx=(img.width-min)/2, sy=(img.height-min)/2;
        ctx.drawImage(img,sx,sy,min,min,0,0,size,size);
        resolve(canvas.toDataURL('image/jpeg',0.75));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

          <div style={{fontSize:15}}>{t.ic}</div>
          <div style={{fontSize:8,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.lb}</div>
        </button>
      ))}
    </div>
  );
}

/* ── CustomerNav ────────────────────────────────────────────── */
function CustomerNav({active,onChange}){
  const tabs=[{id:"shop",ic:"🛍",lb:"Mua Hàng"},{id:"orders",ic:"📦",lb:"Đơn Của Tôi"},{id:"debt",ic:"💳",lb:"Công Nợ"},{id:"profile",ic:"👤",lb:"Tài Khoản"}];
  return(<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",boxShadow:"0 -4px 16px rgba(0,0,0,0.08)",zIndex:50}}>{tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,padding:"9px 4px 7px",border:"none",cursor:"pointer",fontFamily:font,background:"transparent",color:active===t.id?C.blue:C.textMuted,fontWeight:active===t.id?800:500,transition:"all 0.18s"}}><div style={{fontSize:20}}>{t.ic}</div><div style={{fontSize:10,marginTop:1}}>{t.lb}</div></button>)}</div>);}

/* ── Login ──────────────────────────────────────────────────── */
function Login({allUsers,onLogin,onSaveUrl,scriptUrl,loadingAccounts=false}){
  const [u,setU]=useState(()=>{try{return localStorage.getItem("saved_u")||""}catch{return ""}});
  const [p,setP]=useState(()=>{try{return localStorage.getItem("saved_p")||""}catch{return ""}});
  const [showP,setShowP]=useState(false);
  const [rememberMe,setRememberMe]=useState(()=>{try{return !!(localStorage.getItem("saved_u"))}catch{return false}});
  const [url,setUrl]=useState(scriptUrl||"");
  const [showUrl,setShowUrl]=useState(false);const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const [showGuide,setShowGuide]=useState(false);
  const login=async()=>{
    if(!u||!p){setErr("Vui lòng nhập đầy đủ");return;}
    setLoading(true);await new Promise(r=>setTimeout(r,350));
    const found=allUsers.find(x=>String(x.username)===u.trim()&&String(x.password)===p.trim());
    if(!found){setErr("Sai tài khoản hoặc mật khẩu");setLoading(false);return;}
    if(rememberMe&&localStorage.setItem){localStorage.setItem("saved_u",u);localStorage.setItem("saved_p",p);}
    else if(localStorage.removeItem){localStorage.removeItem("saved_u");localStorage.removeItem("saved_p");}
    onSaveUrl(url);onLogin(found);
  };

/* ── SELLER PROFILE ─────────────────────────────────────────── */
function SellerProfile({currentUser,onLogout,onUpdateUser,orders,debts,customers,scriptUrl,onSaveUrl,api}){
  const [showGuide,setShowGuide]=useState(false);
  const [editing,setEditing]=useState(false);
  const [shopName,setShopName]=useState(currentUser.ten||"");
  const [shopPhone,setShopPhone]=useState(currentUser.sdt||"");
  const [toast,setToast]=useState("");
  const [showPicker,setShowPicker]=useState(false);
  const notify=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  const saveInfo=()=>{
    if(api) api.post("updateUser",{id:currentUser.id,ten:shopName.trim(),sdt:shopPhone.trim()}).catch(()=>{});
    onUpdateUser&&onUpdateUser({...currentUser,ten:shopName.trim(),sdt:shopPhone.trim()});
    setEditing(false); notify("✅ Đã lưu!");
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:40,fontFamily:font}}>
      {showGuide&&<GSGuide onClose={()=>setShowGuide(false)}/>}
      {/* Header */}
      {showPicker&&<AvatarPicker current={currentUser.avatar||""} onSelect={async(v)=>{avatarCache.set(currentUser.id,v);onUpdateUser&&onUpdateUser({...currentUser,avatar:v});setShowPicker(false);if(api) api.post("updateUser",{id:currentUser.id,ten:shopName,sdt:shopPhone,avatar:v}).catch(()=>{});}} onClose={()=>setShowPicker(false)}/>}
      <div style={{background:`linear-gradient(135deg,${C.blue},${C.teal})`,padding:"28px 20px 36px",textAlign:"center"}}>
        <div style={{position:"relative",display:"inline-block",marginBottom:12}} onClick={()=>setShowPicker(true)}>
          <Avatar user={{...currentUser,avatar:currentUser.avatar||avatarCache.get(currentUser.id)||""}} size={80} style={{border:"3px solid rgba(255,255,255,0.6)",cursor:"pointer"}}/>
          <div style={{position:"absolute",bottom:2,right:0,width:24,height:24,borderRadius:"50%",background:"white",border:`2px solid ${C.blue}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,boxShadow:"0 2px 6px rgba(0,0,0,0.25)",pointerEvents:"none"}}>📷</div>
        </div>
        <div style={{color:"white",fontWeight:900,fontSize:20}}>{shopName||currentUser.ten}</div>
        <div style={{color:"rgba(255,255,255,0.75)",fontSize:13,marginTop:3}}>@{currentUser.username}</div>
        {shopPhone&&<div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:2}}>📞 {shopPhone}</div>}
      </div>
      {/* Shop info */}
      <div style={{margin:"12px 14px 0"}}>
        <Card style={{padding:0,overflow:"hidden",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:`1px solid ${C.divider}`}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text}}>Thông tin cửa hàng</div>
            <Btn sm onClick={()=>editing?saveInfo():setEditing(true)} outline color={C.blue}>{editing?"✅ Lưu":"✏️ Sửa"}</Btn>
          </div>
          {[["🏪","Tên cửa hàng","ten"],["📞","Số điện thoại","sdt"]].map(([ic,lb,field])=>(
            <div key={field} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:`1px solid ${C.divider}`}}>
              <span style={{fontSize:18}}>{ic}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:C.textMuted,fontWeight:600,marginBottom:2}}>{lb}</div>
                {editing?<Inp value={field==="ten"?shopName:shopPhone} onChange={field==="ten"?setShopName:setShopPhone} placeholder={lb}/>
                :<div style={{fontWeight:700,fontSize:14,color:C.text}}>{field==="ten"?shopName||"—":shopPhone||"—"}</div>}
              </div>
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px"}}>
            <span style={{fontSize:18}}>🔑</span>
            <div style={{flex:1}}><div style={{fontSize:11,color:C.textMuted,fontWeight:600,marginBottom:2}}>Tài khoản</div><div style={{fontWeight:700,fontSize:14,color:C.text}}>{currentUser.username}</div></div>
          </div>
        </Card>
        {/*GS config hidden*/}
        <div style={{fontSize:11,color:C.textMuted,textAlign:"center",marginBottom:8}}>
          </div>
        <button onClick={onLogout} style={{width:"100%",padding:12,borderRadius:14,border:`2px solid ${C.red}`,background:"transparent",color:C.red,fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:font}}>🚪 Đăng xuất</button>
      </div>
      <Toast msg={toast}/>
    </div>
  );
}


/* ── PRINT MODAL ────────────────────────────────────────────── */
function PrintModal({data,onClose}){
  const ref=useRef(null);
  if(!data) return null;
  const thStyle={padding:"6px 8px",background:"#1565C0",color:"white",fontWeight:700,fontSize:11,textAlign:"left"};
  const tdStyle=(i)=>({padding:"5px 8px",borderBottom:"1px solid #E2E8F0",fontSize:12,background:i%2===0?"#F8FAFC":"white"});
  const zaText=`${data.title}\n${data.date}\n\n`+data.rows.map((r,i)=>`${i+1}. ${r.tenHang||r.ten}${r.ghiChu?` 📝${r.ghiChu}`:r.tenKH&&data.type!=="tong"?` (${r.tenKH})`:""}: ${r.sl}`).join("\n");
  return(
    <Modal onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div><div style={{fontWeight:800,fontSize:15,color:C.blue}}>{data.title}</div><div style={{fontSize:11,color:C.textMuted}}>{data.date}</div></div>
        <div style={{display:"flex",gap:6}}>
          <Btn sm outline color={C.blue} onClick={async()=>{
            if(!window.html2canvas||!ref.current) return;
            const cv=await window.html2canvas(ref.current,{scale:2,useCORS:true,backgroundColor:"#fff"});
            cv.toBlob(async(blob)=>{
              if(navigator.share&&navigator.canShare){
                const file=new File([blob],`don-${Date.now()}.jpg`,{type:"image/jpeg"});
                if(navigator.canShare({files:[file]})){
                  try{await navigator.share({files:[file],title:data.title});return;}
                  catch(e){if(e.name==="AbortError") return;}
                }
              }
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");a.href=url;a.download=`don-${Date.now()}.jpg`;a.click();
              setTimeout(()=>URL.revokeObjectURL(url),1000);
            },"image/jpeg",0.9);
          }}>🖼️ Chia sẻ ảnh</Btn>
        </div>
      </div>
      <div ref={ref} style={{background:"white",padding:"8px 4px"}}>
        <div style={{fontWeight:800,fontSize:13,color:C.blue,marginBottom:6}}>{data.title} — {data.date}</div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><th style={thStyle}>STT</th>{data.type!=="tong"&&<th style={{...thStyle,width:90,whiteSpace:"nowrap"}}>KHÁCH</th>}<th style={{...thStyle,width:"99%"}}>TÊN HÀNG</th><th style={{...thStyle,textAlign:"center"}}>SL</th></tr></thead>
          <tbody>{data.rows.map((r,i)=>(
            <tr key={i}><td style={tdStyle(i)}>{i+1}</td>{data.type!=="tong"&&<td style={{...tdStyle(i),fontWeight:600,whiteSpace:"nowrap",minWidth:90}}>{r.tenKH||"—"}</td>}
              <td style={tdStyle(i)}>{r.tenHang||r.ten}{r.ghiChu&&<div style={{fontSize:10,color:"#888",marginTop:2}}>📝 {r.ghiChu}</div>}</td>
              <td style={{...tdStyle(i),textAlign:"center",fontWeight:800,color:"#1565C0"}}>{r.sl}</td></tr>
          ))}</tbody>
        </table>
        <div style={{textAlign:"right",fontWeight:800,fontSize:13,marginTop:6,paddingRight:4}}>TỔNG: {data.rows.reduce((a,r)=>a+r.sl,0)}</div>
      </div>
    </Modal>
  );
}

/* ── NGUON HANG TAB (Đơn Tạm) ───────────────────────────────── */
function NguonHangTab({orders,products,setOrders,setDebts,api,onEditOrder}){
  const [sel,setSel]=useState(null);
  const [selSrc,setSelSrc]=useState(null); // nguồn đang xem chi tiết
  const [printData,setPrintData]=useState(null);
  const [toast,setToast]=useState("");
  const [busyApprove,setBusyApprove]=useState(false);
  const srcDetailRef=useRef(null);
  const [busyDel,setBusyDel]=useState(false);
  const notify=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const prodMap=useMemo(()=>{const m={};products.forEach(p=>{m[p.id]=p;});return m;},[products]);
  const pendingOrders=orders.filter(o=>o.trangThai==="pending").sort((a,b)=>new Date(b.ngay)-new Date(a.ngay));

  const deleteAllPending=async()=>{
    if(!window.confirm(`Xoá tất cả ${pendingOrders.length} đơn tạm?`)) return;
    setBusyDel(true);
    try{
      for(const o of pendingOrders){
        if(api) await api.post("cancelOrder",{id:o.id,maKH:o.maKH||"",tenKH:o.tenKH||"",tongTien:o.tongTien||0,reversDebt:false});
      }
      setOrders(os=>os.filter(o=>o.trangThai!=="pending"));
      notify("✅ Đã xoá tất cả đơn tạm!");
    }catch(e){notify("⚠️ Có lỗi: "+e.message);}
    finally{setBusyDel(false);}
  };

  // Tổng hợp theo nguồn
  const bySrc=useMemo(()=>{
    const m={};
    pendingOrders.forEach(o=>o.items?.forEach(it=>{
      const src=it.nhom||prodMap[it.maSP]?.nhom||"Khác";
      if(!m[src]) m[src]={src,sl:0,chi:0,thu:0,lai:0,don:0};
      const chi=(it.von||prodMap[it.maSP]?.von||0)*it.sl;
      const thu=it.gia*it.sl;
      m[src].sl+=it.sl; m[src].chi+=chi; m[src].thu+=thu; m[src].lai+=thu-chi; m[src].don++;
    }));
    return Object.entries(m).sort((a,b)=>b[1].thu-a[1].thu);
  },[pendingOrders,prodMap]);

  const totals=pendingOrders.reduce((a,o)=>({
    sl:a.sl+(o.items?.reduce((s,i)=>s+i.sl,0)||0),
    chi:a.chi+(o.tongVon||0),
    thu:a.thu+o.tongTien,
    lai:a.lai+(o.tongTien-(o.tongVon||0))
  }),{sl:0,chi:0,thu:0,lai:0});

  const approve=async(id)=>{
    if(busyApprove) return; setBusyApprove(true);
    try{
      const o=orders.find(x=>x.id===id); if(!o) return;

      // Bước 1: Cập nhật DonHang → done
      if(api){
        const r=await api.post("approveOrder",{id});
        if(r?.error){ notify("⚠️ Lỗi duyệt: "+r.error); return; }
      }
      setOrders(os=>os.map(x=>x.id===id?{...x,trangThai:"done"}:x));

      // Bước 2: Ghi CongNo (giống flow Bán) — chỉ với khách có tên
      if(o.maKH && o.maKH!=="le"){
        const de={
          id:genId("CN"), maKH:o.maKH, tenKH:o.tenKH,
          loai:"no", soTien:o.tongTien,
          ngay:nowISO(), ghiChu:id, maDon:id
        };
        if(api){
          const r2=await api.post("addDebt",de);
          if(r2?.error) notify("⚠️ Lỗi ghi nợ: "+r2.error);
        }
        setDebts&&setDebts(ds=>[de,...ds]);
      }

      notify("✅ Đã duyệt!"); setSel&&setSel(null);
    }finally{setBusyApprove(false);}
  };

  const printOrder=(o)=>{
    const rows=o.items?.map(it=>({tenKH:o.tenKH,tenHang:it.ten,sl:it.sl,ghiChu:it.ghiChu||""}));
    setPrintData({title:`ĐƠN TẠM ${o.id}`,date:fmtDate(o.ngay),rows:rows||[],type:"chitiet"});
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80,fontFamily:font}}>
      {printData&&<PrintModal data={printData} onClose={()=>setPrintData(null)}/>}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontWeight:800,fontSize:14,color:C.orange}}>📝 Tổng hợp đơn tạm</div>
          {pendingOrders.length>0&&<button onClick={deleteAllPending} disabled={busyDel}
            style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${C.red}`,background:"white",color:C.red,fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:font}}>
            {busyDel?"⏳...":"🗑️ Xoá tất cả"}

        </div>
        {bySrc.length===0?<div style={{fontSize:12,color:C.textMuted,textAlign:"center",padding:"6px 0"}}>Không có đơn tạm</div>:<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 40px 56px 56px 50px",gap:4,marginBottom:4,fontSize:10,color:C.textMuted,fontWeight:700,padding:"0 2px"}}>
            <span>NGUỒN</span><span style={{textAlign:"right"}}>SL</span><span style={{textAlign:"right",color:C.red}}>CHI</span><span style={{textAlign:"right",color:C.blue}}>THU</span><span style={{textAlign:"right",color:C.green}}>LÃI</span>
          </div>
          {bySrc.map(([src,s])=>(
            <div key={src} onClick={()=>setSelSrc(src)}
              style={{display:"grid",gridTemplateColumns:"1fr 40px 56px 56px 50px",gap:4,padding:"6px 2px",borderTop:`1px solid ${C.divider}`,fontSize:12,cursor:"pointer",background:selSrc===src?C.blueLight:"transparent",borderRadius:4}}>
              <span style={{fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{src}</span>
              <span style={{textAlign:"right",color:C.textSec}}>{s.sl}</span>
              <span style={{textAlign:"right",color:C.red,fontSize:11}}>{fmt(s.chi)}</span>
              <span style={{textAlign:"right",color:C.blue,fontSize:11}}>{fmt(s.thu)}</span>
              <span style={{textAlign:"right",color:C.green,fontWeight:700,fontSize:11}}>{fmt(s.lai)}</span>
            </div>
          ))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 40px 56px 56px 50px",gap:4,padding:"5px 2px",borderTop:`2px solid ${C.border}`,fontSize:12,fontWeight:800}}>
            <span>TỔNG ({pendingOrders.length} đơn)</span>
            <span style={{textAlign:"right"}}>{totals.sl}</span>
            <span style={{textAlign:"right",color:C.red}}>{fmt(totals.chi)}</span>
            <span style={{textAlign:"right",color:C.blue}}>{fmt(totals.thu)}</span>
            <span style={{textAlign:"right",color:C.green,fontWeight:800}}>{fmt(totals.lai)}</span>
          </div>
        </>}
      </div>
      {/* Chi tiết nguồn — modal */}
      {selSrc&&(()=>{
        const srcOrders=pendingOrders.filter(o=>o.items?.some(it=>(it.nhom||prodMap[it.maSP]?.nhom||"Khác")===selSrc));
        const srcRows=srcOrders.flatMap(o=>o.items?.filter(it=>(it.nhom||prodMap[it.maSP]?.nhom||"Khác")===selSrc).map(it=>({tenKH:o.tenKH,tenHang:it.ten,sl:it.sl,ghiChu:it.ghiChu||""})));
        const srcTotal=srcRows.reduce((a,r)=>a+r.sl,0);
        return(
          <Modal onClose={()=>setSelSrc(null)}>
            <div style={{marginBottom:12}}>
              <div style={{fontWeight:900,fontSize:17,color:C.blue,marginBottom:8}}>📦 Nguồn {selSrc}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
              <Btn sm outline color={C.blue} onClick={()=>{
                setPrintData({title:`ĐƠN TẠM: ${selSrc.toUpperCase()}`,date:new Date().toLocaleDateString("vi"),rows:srcRows,type:"chitiet"});
                setSelSrc(null);
              }}>🖨️ In</Btn>
              <Btn sm color={C.green} onClick={()=>{
                // Tổng hợp theo sản phẩm
                const spMap={};
                srcRows.forEach(r=>{if(!spMap[r.tenHang]) spMap[r.tenHang]=0; spMap[r.tenHang]+=r.sl;});
                const spRows=Object.entries(spMap).map(([ten,sl])=>({tenHang:ten,sl}));
                setPrintData({title:`TỔNG SP: ${selSrc.toUpperCase()}`,date:new Date().toLocaleDateString("vi"),rows:spRows,type:"tong"});
                setSelSrc(null);
              }}>📊 Tổng SP</Btn>
              <button onClick={()=>setSelSrc(null)} style={{background:C.divider,border:"none",borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
            </div>
            <div ref={srcDetailRef} style={{background:"white",padding:"8px 4px"}}>
              
              <div style={{fontSize:11,color:C.textMuted,marginBottom:10}}>{new Date().toLocaleDateString("vi")} · {srcOrders.length} đơn · {srcTotal} sản phẩm</div>
              {srcRows.map((r,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 32px",gap:6,padding:"6px 0",borderBottom:`1px solid ${C.divider}`,fontSize:12}}>
                  <span style={{fontWeight:600,color:C.text}}>{r.tenHang}{r.ghiChu&&<span style={{color:C.textMuted,fontWeight:400}}> 📝{r.ghiChu}</span>}</span>
                  <span style={{color:C.textMuted,fontSize:11}}>{r.tenKH}</span>

      <div style={{padding:"8px 12px",display:"flex",flexDirection:"column",gap:8}}>
        {pendingOrders.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted}}><div style={{fontSize:40}}>📭</div><div style={{fontWeight:600,marginTop:8}}>Không có đơn tạm</div></div>}
        {pendingOrders.map(o=>(
          <Card key={o.id} onClick={()=>setSel(o)} style={{padding:"12px 14px",border:`1.5px solid ${C.amber}44`,background:"#FFFBEB"}}>

              <div>

                  <span style={{fontWeight:800,fontSize:12,color:C.orange}}>{o.id}</span>

              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:900,fontSize:16,color:C.orange}}>{fmt(o.tongTien)}</div>
                <Btn onClick={e=>{e.stopPropagation();approve(o.id);}} color={C.green} sm disabled={busyApprove} style={{marginTop:4}}>{busyApprove?"...":"✅ Duyệt"}</Btn>
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {o.items?.slice(0,3).map((it,i)=><span key={i} style={{background:"#FEF3C7",padding:"2px 8px",borderRadius:8,fontSize:11,color:C.orange,fontWeight:600}}>{it.ten.length>12?it.ten.slice(0,12)+"…":it.ten} ×{it.sl}</span>)}
              {(o.items?.length||0)>3&&<span style={{fontSize:11,color:C.textMuted}}>+{o.items.length-3} sp</span>}
            </div>
          </Card>
        ))}
      </div>
      {/* Detail modal */}
      {sel&&(
        <Modal onClose={()=>setSel(null)}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <div style={{fontWeight:800,fontSize:16,color:C.orange,flex:1}}>{sel.id}</div>
            <Badge label="⏳ Chờ duyệt" color={C.orange} bg={C.orangeLight}/>

          ))}

          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Btn onClick={async()=>{
              let orderToEdit=sel;
              // Lấy dữ liệu mới nhất từ GS nếu có API
              if(api){
                try{
                  const res=await api.get("getDonHang");
                  if(res?.data){
                    const fresh=res.data.find(o=>o.id===sel.id);
                    if(fresh) orderToEdit=fresh;
                  }
                }catch(e){}
              }
              onEditOrder(orderToEdit);setSel(null);
            }} color={C.blue} style={{flex:1}}>✏️ Sửa</Btn>
            <Btn onClick={()=>approve(sel.id)} color={C.green} style={{flex:1}} disabled={busyApprove}>{busyApprove?"⏳...":"✅ Duyệt"}</Btn>
            <Btn onClick={()=>{printOrder(sel);setSel(null);}} outline color={C.blue} style={{flex:1}}>🖨️ In</Btn>
            <Btn onClick={async()=>{if(!window.confirm("Xoá đơn "+sel.id+"?")) return;
              const isDone=sel.trangThai==="done";
              if(api){
                const res=await api.post("cancelOrder",{
                  id:sel.id, maKH:sel.maKH||"", tenKH:sel.tenKH||"",
                  tongTien:sel.tongTien||0,
                  reversDebt:isDone&&sel.maKH!=="le"
                });
                if(res?.error) console.error("cancelOrder error:",res.error);
              }
              // Xóa đơn khỏi local state
              setOrders(os=>os.filter(o=>o.id!==sel.id));
              // Xóa công nợ liên quan khỏi local state (GAS đã xóa trên sheet)
              if(isDone&&sel.maKH!=="le"&&setDebts){
                setDebts(ds=>ds.filter(d=>d.maDon!==sel.id&&!(d.ghiChu||"").includes(sel.id)));
              }
              setSel(null);notify("✅ Đã xoá đơn!");}} style={{flex:1}}>🗑️ Xoá</Btn>
          </div>
        </Modal>
      )}
      <Toast msg={toast}/>
    </div>
  );
}


/* ── SELL KH SELECT (autocomplete on white bg for header) ─── */

function SellTab({products,customers,setOrders,setDebts,api,editOrder,setEditOrder}){
  const [cart,setCart]=useState({});
  const [cartNote,setCartNote]=useState({});
  const [cartGia,setCartGia]=useState({});
  const [selKH,setSelKH]=useState("le");
  const [search,setSearch]=useState("");
  const [nhom,setNhom]=useState("Tất cả");
  const [showCart,setShowCart]=useState(false);
  const [toast,setToast]=useState("");
  const [busy,setBusy]=useState(false);
  const [editingQty,setEditingQty]=useState(null);
  const notify=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const reset=()=>{setCart({});setCartNote({});setCartGia({});setShowCart(false);setEditingQty(null);};
  useEffect(()=>{
    if(!editOrder) return;
    const nc={},nn={},ng={};
    editOrder.items?.forEach(it=>{
      if(!it.maSP) return;
      nc[it.maSP]=it.sl;
      if(it.ghiChu) nn[it.maSP]=it.ghiChu;
      // Luôn lấy giá đã lưu trong ChiTietDon — không dùng giá gốc sản phẩm
      ng[it.maSP]=it.gia;
    });
    setCart(nc);setCartNote(nn);setCartGia(ng);setSelKH(editOrder.maKH||"le");setShowCart(true);
  },[editOrder]);
  const getGia=(p)=>{const v=cartGia[p.id];return(v===undefined||v===null||v==="")?p.gia:v;};
  const nhomList=["Tất cả",...new Set(products.map(p=>p.nhom).filter(x=>x&&x!=="Khác"))];
  const filtered=products.filter(p=>p.ten&&p.ten.trim()&&(nhom==="Tất cả"||p.nhom===nhom)&&(search===""||p.ten.toLowerCase().includes(search.toLowerCase())));
  const cartProds=products.filter(p=>cart[p.id]>0);
  const total=cartProds.reduce((a,p)=>a+Math.round(Number(getGia(p))||0)*(cart[p.id]||0),0);
  const totalQty=Object.values(cart).reduce((a,b)=>a+b,0);
  const add=(p)=>setCart(c=>({...c,[p.id]:Math.min(999,(c[p.id]||0)+1)}));
  const dec=(p)=>setCart(c=>({...c,[p.id]:Math.max(0,(c[p.id]||0)-1)}));
  const submit=async(mode)=>{
    if(busy) return;
    if(totalQty===0){notify("⚠️ Chưa có sản phẩm!");return;}
    setBusy(true);
    try{
      const khObj=customers.find(k=>k.id===selKH);
      console.log('[CART] cartGia:',cartGia);
      const items=cartProds.map(p=>({maSP:p.id,ten:p.ten,nhom:p.nhom||"",sl:cart[p.id],gia:Math.round(Number(getGia(p))||Number(p.gia)||0),giaNiemYet:Math.round(Number(p.gia)||0),von:Math.round(Number(p.von)||0),ghiChu:cartNote[p.id]||""}));
      const von=items.reduce((a,it)=>a+(it.von||0)*it.sl,0);

      if(editOrder){
        // Cập nhật đúng đơn cũ — giữ nguyên ID và ngày tạo
        const newDebtId=genId("CN");
        const isDoneOrder=editOrder.trangThai==="done";
        const khNguoi=selKH!=="le";
        // Gộp newDebtId vào 1 lần gọi duy nhất
        const updated={
          ...editOrder,
          maKH:selKH==="le"?"le":selKH,
          tenKH:khObj?.ten||"Khách lẻ",
          tongTien:total, tongVon:von, items,
          newDebtId: isDoneOrder&&khNguoi ? newDebtId : null,
          isEdit: true
        };
        if(api){
          const r=await api.post("updateOrder",updated);
          if(r?.error) notify("⚠️ Lỗi GAS: "+r.error);
        }
        setOrders(os=>os.map(o=>o.id===editOrder.id?updated:o));
        // Sync local debts: xóa CN cũ, thêm CN mới nếu đơn đã giao
        if(isDoneOrder&&khNguoi){
          const maKH=selKH; const tenKH=khObj?.ten||"Khách lẻ";
          setDebts&&setDebts(ds=>[
            {id:newDebtId,maKH,tenKH,loai:"no",soTien:total,ngay:nowISO(),ghiChu:`Bán ${editOrder.id}`,maDon:editOrder.id},
            ...ds.filter(d=>d.maDon!==editOrder.id&&!(d.ghiChu||"").includes(editOrder.id))
          ]);
        }
        setEditOrder(null); reset();
        notify("✅ Đã cập nhật đơn "+editOrder.id+"!");
        return;
      }

      const id=genId("BH");
      const o={id,maKH:selKH==="le"?"le":selKH,tenKH:khObj?.ten||"Khách lẻ",ngay:nowISO(),trangThai:mode==="sell"?"done":"pending",tongTien:total,tongVon:von,items};
      if(api) await api.post("createOrder",o);
      setOrders(os=>[o,...os]);
      if(mode==="sell"){const de={id:genId("CN"),maKH:selKH==="le"?"le":selKH,tenKH:khObj?.ten||"Khách lẻ",loai:"no",soTien:total,ngay:nowISO(),ghiChu:`Bán ${id}`,maDon:id};if(api){ const r=await api.post("addDebt",de); if(r?.error) console.error("addDebt error:",r.error,de); }setDebts(ds=>[de,...ds]);notify("✅ Bán hàng thành công!");}else{notify("✅ Đặt hàng thành công!");}
      reset();
    }catch(e){notify("❌ Lỗi: "+e.message);}finally{setBusy(false);}
  };
  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80,fontFamily:font}}>
      {/* Sticky pinned header */}
      <div style={{position:"sticky",top:48,zIndex:50,background:`linear-gradient(135deg,${C.blue},${C.teal})`,padding:"10px 12px",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        {/* Row 1: Khách + Ngày giờ + Cart */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <AutocompleteKH customers={customers} value={selKH} onChange={setSelKH} walkIn placeholder="👤 Khách lẻ — tìm khách..."/>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{color:"white",fontSize:11,fontWeight:700,lineHeight:1.3}}>{(()=>{const n=new Date();return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getFullYear()).slice(-2)} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;})()}</div>
            <div style={{color:"rgba(255,255,255,0.75)",fontSize:10}}></div>
          </div>
          {totalQty>0&&<button onClick={()=>setShowCart(true)} style={{background:"white",color:C.blue,border:"none",borderRadius:20,padding:"5px 12px",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:font,display:"flex",alignItems:"center",gap:5,flexShrink:0}}>🛒<span style={{background:C.blue,color:"white",borderRadius:9,minWidth:18,height:18,padding:"0 5px",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,boxSizing:"border-box"}}>{totalQty}</span>{fmt(total)}</button>}
          {totalQty===0&&<div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>🛒 Trống</div>}
        </div>
      </div>
      <div style={{background:C.card,borderBottom:`1px solid ${C.divider}`,position:"sticky",top:102,zIndex:20}}>
        <div style={{padding:"10px 12px 4px",position:"relative"}}>
          <Inp value={search} onChange={setSearch} placeholder="Tìm sản phẩm..." pfx="🔍" style={{paddingRight:search?36:14}}/>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:24,top:"50%",transform:"translateY(-50%)",background:"#CBD5E1",border:"none",borderRadius:"50%",width:20,height:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#64748B",fontWeight:700,zIndex:1}}>✕</button>}
        </div>
        <div style={{padding:"0 12px 8px"}}><Pills options={nhomList} value={nhom} onChange={setNhom}/></div>

      </div>
      <div style={{padding:"8px 12px",display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(p=>{const qty=cart[p.id]||0;return(
          <div key={p.id} style={{background:C.card,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,boxShadow:C.shadow}}>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.ten}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:1}}>
                <div style={{fontSize:13,color:C.blue,fontWeight:800}}>{fmt(p.gia)}</div>
                {p.nhan&&<div style={{fontSize:11,color:C.textMuted,fontStyle:"italic"}}>{p.nhan}</div>}
              </div></div>
            {(qty===0&&editingQty!==p.id)?<button onClick={()=>add(p)} style={{background:C.blue,color:"white",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:20,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
            :<div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <button onClick={()=>dec(p)} style={{background:"#E2E8F0",border:"none",borderRadius:"50%",width:30,height:30,cursor:"pointer",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
              {editingQty===p.id?<input autoFocus inputMode="numeric" value={cart[p.id]||0} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setCart(cc=>({...cc,[p.id]:v===""?0:Math.min(999,Math.max(0,parseInt(v)||0))}));}} onBlur={e=>{const v=parseInt(e.target.value)||0;setCart(cc=>({...cc,[p.id]:v}));setEditingQty(null);}} onFocus={e=>e.target.select()} onKeyDown={e=>e.key==="Enter"&&setEditingQty(null)} style={{width:48,textAlign:"center",fontWeight:800,color:C.blue,fontSize:14,border:"none",outline:"none",fontFamily:font,background:"transparent"}}/>
              :<span onClick={()=>setEditingQty(p.id)} style={{fontWeight:800,color:C.blue,minWidth:44,textAlign:"center",fontSize:14,cursor:"text"}}>{qty}</span>}
              <button onClick={()=>add(p)} style={{background:C.green,color:"white",border:"none",borderRadius:"50%",width:30,height:30,cursor:"pointer",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>}
          </div>
        );})}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted}}><div style={{fontSize:40}}>🔍</div><div style={{fontWeight:600,marginTop:8}}>Không tìm thấy sản phẩm</div></div>}
      </div>
      {showCart&&(
        <Modal onClose={()=>setShowCart(false)} fullBottom>
          <ModalHeader title="🛒 Giỏ hàng" onClose={()=>setShowCart(false)}/>
          {cartProds.map(p=>{const gia=getGia(p);return(
            <div key={p.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.divider}`}}>
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:6}}>
                <div style={{fontWeight:700,fontSize:14,color:C.text,flexShrink:0,maxWidth:"50%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.ten}</div>
                <input value={cartNote[p.id]||""} onChange={e=>setCartNote(n=>({...n,[p.id]:e.target.value}))} placeholder="..." style={{flex:1,fontSize:12,padding:"2px 4px",border:"none",outline:"none",fontFamily:font,background:"transparent",color:C.textMuted,minWidth:0,fontStyle:"italic"}}/>
              </div>
              {/* Giá × SL = thành tiền — 1 hàng */}
              {p.nhan&&<div style={{fontSize:11,color:C.textMuted,marginBottom:3,fontStyle:"italic"}}>📦 {p.nhan}</div>}
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input
                  type="number" inputMode="numeric"
                  defaultValue={p.gia}
                  value={cartGia[p.id]!==undefined?cartGia[p.id]:p.gia}
                  onChange={e=>setCartGia(g=>({...g,[p.id]:e.target.value}))}
                  onFocus={e=>e.target.select()}
                  style={{width:76,textAlign:"right",padding:"3px 6px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,fontWeight:700,color:C.blue,fontFamily:font,outline:"none"}}/>
                <span style={{color:C.textMuted,fontSize:13}}>×</span>
                <button onClick={()=>dec(p)} style={{width:26,height:26,borderRadius:"50%",border:"none",background:"#E2E8F0",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
                {editingQty===`cart_${p.id}`?<input autoFocus inputMode="numeric" defaultValue={cart[p.id]||""} onFocus={e=>e.target.select()} onBlur={e=>{const v=parseInt(e.target.value)||0;setCart(cc=>v>0?{...cc,[p.id]:v}:Object.fromEntries(Object.entries(cc).filter(([k])=>k!==p.id)));setEditingQty(null);}} onKeyDown={e=>{if(e.key==="Enter") e.target.blur();if(e.key==="Escape") setEditingQty(null);}} style={{width:52,textAlign:"center",fontWeight:800,color:C.blue,fontSize:13,border:"none",outline:"none",fontFamily:font,background:"transparent",flexShrink:0}}/>
                :<span onClick={()=>setEditingQty(`cart_${p.id}`)} style={{fontWeight:800,color:C.blue,minWidth:40,textAlign:"center",fontSize:14,cursor:"text",flexShrink:0}}>{cart[p.id]}</span>}
                <button onClick={()=>add(p)} style={{width:26,height:26,borderRadius:"50%",border:"none",background:C.green,color:"white",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                <span style={{color:C.textMuted,fontSize:13}}>=</span>
                <div style={{fontWeight:800,color:C.blue,fontSize:14,flex:1,textAlign:"right"}}>{fmt(gia*cart[p.id])}</div>
              </div>
            </div>
          );})}
          <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderTop:`2px solid ${C.divider}`,marginBottom:4}}>
            <div><div style={{fontSize:11,color:C.textMuted}}>Số lượng</div><div style={{fontWeight:700}}>{cartProds.reduce((a,p)=>a+cart[p.id],0)} sp</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:C.textMuted}}>Tổng tiền</div><div style={{fontWeight:900,fontSize:18,color:C.blue}}>{fmt(total)}</div></div>
          </div>
          {editOrder
            ?<div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>{setEditOrder(null);reset();}} outline color={C.red} style={{flex:1}}>🗑️ Huỷ</Btn>
              <Btn onClick={()=>submit("update")} color={C.blue} style={{flex:2}} disabled={busy}>{busy?"⏳...":"✅ Cập nhật đơn"}</Btn>
            </div>
            :<div style={{display:"flex",gap:8}}>
              <Btn onClick={reset} outline color={C.red} style={{flex:1}}>🗑️ Xoá</Btn>
              <Btn onClick={()=>submit("order")} outline color={C.orange} style={{flex:1}} disabled={busy}>📋 Đặt</Btn>
              <Btn onClick={()=>submit("sell")} color={C.green} style={{flex:1}} disabled={busy}>💰 Bán</Btn>
            </div>
          }
        </Modal>
      )}
      <Toast msg={toast}/>
    </div>
  );
}

/* ── INVOICE MODAL (receipt format) ────────────────────────── */
function InvoiceModal({order,shopName,shopAvatar,onClose}){
  const ref=useRef(null);
  const totalSP=order.items?.reduce((a,i)=>a+i.sl,0)||0;
  const notify=(m)=>alert(m);

  const doShare=async()=>{
    if(!window.html2canvas||!ref.current) return;
    const canvas=await window.html2canvas(ref.current,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
    canvas.toBlob(async(blob)=>{
      if(navigator.share&&navigator.canShare){
        const file=new File([blob],`don-${order.id}.jpg`,{type:"image/jpeg"});
        if(navigator.canShare({files:[file]})){
          try{await navigator.share({files:[file],title:`Đơn hàng ${order.id}`,text:`${shopName} - ${order.tenKH}`});return;}
          catch(e){if(e.name==="AbortError") return;}
        }
      }
      // Fallback download
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=`don-${order.id}.jpg`;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    },"image/jpeg",0.9);
  };

  const doZalo=()=>{
    const lines=order.items?.map((it,i)=>`${i+1}. ${it.ten} x${it.sl} = ${fmt(it.gia*it.sl)}`).join("\n");
    const text=[shopName,"KH: "+order.tenKH+" - "+order.id,fmtDate(order.ngay),"──────────────────────────",lines,"──────────────────────────","Tổng "+totalSP+" SP: "+fmt(order.tongTien)].join("\n");
    navigator.clipboard?.writeText(text).then(()=>alert("✅ Đã copy! Dán vào Zalo"));
  };

  const doPDF=()=>{
    const w=window.open("","_blank");
    const rows=(order.items||[]).map((it,i)=>"<tr><td>"+(i+1)+"</td><td>"+it.ten+"</td><td>"+it.sl+"</td><td>"+fmt(it.gia)+"</td><td><b>"+fmt(it.gia*it.sl)+"</b></td></tr>").join("");
    const html="<html><head><title>Don "+order.id+"</title><style>body{font-family:monospace;max-width:320px;margin:20px auto;font-size:13px}table{width:100%;border-collapse:collapse}td{padding:3px 4px}hr{border:1px dashed #000}.tot{font-weight:900}h3{text-align:center;margin:4px 0}</style></head><body>"
      +"<h3>"+shopName+"</h3><hr/>"
      +"<div><b>KH: "+order.tenKH+"</b> - "+order.id+" - "+fmtDate(order.ngay)+"</div><hr/>"
      +"<table><thead><tr><th>#</th><th>Ten</th><th>SL</th><th>Gia</th><th>T.Tien</th></tr></thead><tbody>"+rows+"</tbody></table><hr/>"
      +"<div class='tot'>Tong "+totalSP+" SP <span style='float:right'>"+fmt(order.tongTien)+"</span></div>"
      +"</body></html>";
    w.document.write(html);
    w.document.close();setTimeout(()=>w.print(),300);
  };

  return(
    <Modal onClose={onClose}>
      <div ref={ref} style={{background:"white",padding:"16px 12px",borderRadius:8,marginBottom:12,border:"1px solid #e0e0e0"}}>
        <div style={{textAlign:"center",marginBottom:10}}>
          <Avatar user={{id:"shop",ten:shopName,avatar:shopAvatar||""}} size={60} style={{margin:"0 auto 6px"}}/>
          <div style={{fontWeight:900,fontSize:15,color:"#1565C0",marginTop:4}}>{shopName}</div>
          <div style={{borderBottom:"2px solid #333",margin:"8px 0"}}/>
        </div>
        <div style={{fontSize:12,marginBottom:8}}><b>KH: {order.tenKH}</b> · {order.id} · {fmtDate(order.ngay)}</div>
        <div style={{borderTop:"1px dashed #888",marginBottom:6}}/>
        <div style={{display:"grid",gridTemplateColumns:"22px 1fr 28px 46px 52px",fontSize:11,fontWeight:700,color:"#444",padding:"0 2px",marginBottom:4}}>
          <span>#</span><span>Tên</span><span style={{textAlign:"center"}}>SL</span><span style={{textAlign:"right"}}>Đ.Giá</span><span style={{textAlign:"right"}}>T.Tiền</span>
        </div>
        <div style={{borderBottom:"1px dashed #aaa",marginBottom:4}}/>
        {order.items?.map((it,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"22px 1fr 28px 46px 52px",fontSize:12,padding:"4px 2px",borderBottom:"1px solid #f0f0f0"}}>
            <span style={{color:"#888"}}>{i+1}.</span>
            <span style={{fontWeight:600}}>{it.ten}{it.ghiChu&&<span style={{fontSize:10,color:"#888",fontWeight:400}}> ({it.ghiChu})</span>}</span>
            <span style={{textAlign:"center"}}>{it.sl}</span>
            <span style={{textAlign:"right",color:"#555",fontSize:11}}>{fmt(it.gia)}</span>
            <span style={{textAlign:"right",fontWeight:800,color:"#1565C0"}}>{fmt(it.gia*it.sl)}</span>
          </div>
        ))}
        <div style={{borderTop:"1px dashed #888",margin:"6px 0"}}/>
        <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:14}}>
          <span>Tổng {totalSP} SP</span><span style={{color:"#1565C0"}}>{fmt(order.tongTien)}</span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
        <button onClick={doShare} style={{padding:"11px 0",borderRadius:10,border:"none",background:"#4CAF50",color:"white",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🖼️ ẢNH</button>
        <button onClick={doPDF} style={{padding:"11px 0",borderRadius:10,border:"none",background:"#F44336",color:"white",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📄 PDF</button>
        <button onClick={doZalo} style={{padding:"11px 0",borderRadius:10,border:"none",background:"#1565C0",color:"white",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>💬 ZALO</button>
      </div>
      <button onClick={onClose} style={{width:"100%",padding:"11px 0",borderRadius:10,border:"1px solid #ddd",background:"#f5f5f5",color:"#666",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ĐÓNG</button>
    </Modal>
  );
}

/* ── ORDERS TAB ─────────────────────────────────────────────── */
function OrdersTab({orders,setOrders,debts,setDebts,api,onEditOrder,currentUser}){
  const [timeF,setTimeF]=useState("today");
  const [doneTimeF,setDoneTimeF]=useState("today");
  const [search,setSearch]=useState("");
  const [sel,setSel]=useState(null);
  const [toast,setToast]=useState("");
  const [busyApprove,setBusyApprove]=useState(false);
  const [printOrder,setPrintOrder]=useState(null);
  const [invoiceOrder,setInvoiceOrder]=useState(null);
  const notify=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const filtered=orders.filter(o=>{
    const d=new Date(o.ngay),now=new Date();
    if(timeF==="today"&&!sameDay(o.ngay)) return false;
    if(timeF==="week"&&(now-d)/86400000>7) return false;
    if(timeF==="month"&&(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear())) return false;
    if(timeF==="year"&&d.getFullYear()!==now.getFullYear()) return false;
    if(search){const q=search.toLowerCase();if(!o.tenKH.toLowerCase().includes(q)&&!o.items?.some(it=>it.ten.toLowerCase().includes(q))) return false;}
    return true;
  }).sort((a,b)=>new Date(b.ngay)-new Date(a.ngay));
  const doneList=filtered.filter(o=>o.trangThai==="done");
  const doneFiltered=useMemo(()=>orders.filter(o=>{
    if(o.trangThai!=="done") return false;
    const d=new Date(o.ngay),now=new Date();
    if(doneTimeF==="today"&&!sameDay(o.ngay)) return false;
    if(doneTimeF==="week"&&(now-d)/86400000>7) return false;
    if(doneTimeF==="month"&&(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear())) return false;
    return true;
  }),[orders,doneTimeF]);
  const doneBySrc=useMemo(()=>{
    const m={};
    doneFiltered.forEach(o=>o.items?.forEach(it=>{const src=it.nhom||"Khác";if(!m[src]) m[src]={sl:0,chi:0,thu:0,lai:0};m[src].sl+=it.sl;m[src].chi+=(it.von||0)*it.sl;m[src].thu+=it.gia*it.sl;m[src].lai+=(it.gia-(it.von||0))*it.sl;}));
    return Object.entries(m).sort((a,b)=>b[1].thu-a[1].thu);
  },[doneFiltered]);
  const doneTotals=doneFiltered.reduce((a,o)=>({sl:a.sl+(o.items?.reduce((s,i)=>s+i.sl,0)||0),thu:a.thu+o.tongTien,lai:a.lai+(o.tongTien-o.tongVon)}),{sl:0,thu:0,lai:0});
  const OCard=({o})=>(
    <Card onClick={()=>setSel(o)} style={{padding:"12px 14px",border:`1.5px solid ${C.border}`,background:"white"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{fontWeight:800,fontSize:12,color:C.blue}}>{o.id}</span><Badge label="✅ Đã giao" color={C.green} bg={C.greenLight} size={10}/></div><div style={{fontWeight:700,fontSize:14,color:C.text}}>{o.tenKH}</div><div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{fmtDate(o.ngay)} · {o.items?.length||0} sp</div></div>
        <div style={{textAlign:"right"}}><div style={{fontWeight:900,fontSize:16,color:C.blue}}>{fmt(o.tongTien)}</div><div style={{fontSize:11,color:C.green,fontWeight:600}}>+{fmt(o.tongTien-o.tongVon)} lãi</div></div>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{o.items?.slice(0,3).map((it,i)=><span key={i} style={{background:C.divider,padding:"2px 8px",borderRadius:8,fontSize:11,color:C.textSec,fontWeight:600}}>{it.ten.length>12?it.ten.slice(0,12)+"…":it.ten} ×{it.sl}</span>)}{(o.items?.length||0)>3&&<span style={{fontSize:11,color:C.textMuted}}>+{o.items.length-3} sp</span>}</div>
    </Card>
  );
  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80,fontFamily:font}}>
      {printOrder&&<PrintModal data={printOrder} onClose={()=>setPrintOrder(null)}/>}
      {invoiceOrder&&<InvoiceModal order={invoiceOrder} shopName={currentUser?.ten||"Cửa Hàng"} shopAvatar={currentUser?.avatar||""} onClose={()=>setInvoiceOrder(null)}/>}
      <div style={{background:C.card,padding:"12px 14px",borderBottom:`1px solid ${C.divider}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontWeight:800,fontSize:14,color:C.blue}}>📊 Tổng hợp đã giao</div>
          <div style={{display:"flex",gap:4}}>{[["today","Hôm nay"],["week","7 ngày"],["month","Tháng"],["all","Tất cả"]].map(([v,l])=>(<button key={v} onClick={()=>setDoneTimeF(v)} style={{padding:"3px 8px",borderRadius:10,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:font,background:doneTimeF===v?C.blue:C.divider,color:doneTimeF===v?"white":C.textSec}}>{l}</button>))}</div>
        </div>
        {doneBySrc.length===0?<div style={{fontSize:12,color:C.textMuted,textAlign:"center",padding:"6px 0"}}>Không có đơn</div>:<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 40px 60px 60px 60px",gap:4,marginBottom:4,fontSize:10,color:C.textMuted,fontWeight:700,padding:"0 2px"}}><span>NGUỒN</span><span style={{textAlign:"right"}}>SL</span><span style={{textAlign:"right"}}>CHI</span><span style={{textAlign:"right"}}>THU</span><span style={{textAlign:"right",color:C.green}}>LÃI</span></div>
          {doneBySrc.map(([src,s])=>(<div key={src} style={{display:"grid",gridTemplateColumns:"1fr 40px 60px 60px 60px",gap:4,padding:"4px 2px",borderTop:`1px solid ${C.divider}`,fontSize:12}}><span style={{fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{src}</span><span style={{textAlign:"right",color:C.textSec}}>{s.sl}</span><span style={{textAlign:"right",color:C.red,fontSize:11}}>{fmt(s.chi)}</span><span style={{textAlign:"right",color:C.blue,fontSize:11}}>{fmt(s.thu)}</span><span style={{textAlign:"right",color:C.green,fontWeight:700,fontSize:11}}>{fmt(s.lai)}</span></div>))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 40px 60px 60px 60px",gap:4,padding:"5px 2px",borderTop:`2px solid ${C.border}`,fontSize:12,fontWeight:800}}><span>TỔNG</span><span style={{textAlign:"right"}}>{doneTotals.sl}</span><span style={{textAlign:"right",color:C.red}}>{fmt(doneBySrc.reduce((a,[,s])=>a+s.chi,0))}</span><span style={{textAlign:"right",color:C.blue}}>{fmt(doneTotals.thu)}</span><span style={{textAlign:"right",color:C.green}}>{fmt(doneTotals.lai)}</span></div>
        </>}
      </div>
      <div style={{padding:"10px 12px",background:C.card,borderBottom:`1px solid ${C.divider}`}}>
        <div style={{position:"relative",marginBottom:8}}><Inp value={search} onChange={setSearch} placeholder="🔍 Tìm tên khách hoặc sản phẩm..." style={{fontSize:13}}/>{search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"#CBD5E1",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>✕</button>}</div>
        <div style={{display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none"}}>{[["today","Hôm nay"],["week","7 ngày"],["month","Tháng này"],["year","Năm nay"],["all","Tất cả"]].map(([v,l])=>(<button key={v} onClick={()=>setTimeF(v)} style={{flexShrink:0,padding:"5px 12px",borderRadius:16,border:"none",cursor:"pointer",background:timeF===v?C.blue:C.divider,color:timeF===v?"white":C.textSec,fontWeight:timeF===v?700:500,fontSize:12,fontFamily:font}}>{l}</button>))}</div>
      </div>
      <div style={{padding:"8px 12px",display:"flex",flexDirection:"column",gap:8}}>
        {doneList.map(o=><OCard key={o.id} o={o}/>)}
        {doneList.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted}}><div style={{fontSize:40}}>📭</div><div style={{fontWeight:600,marginTop:8}}>Không có đơn trong khoảng này</div></div>}
      </div>
      {sel&&(
        <Modal onClose={()=>setSel(null)}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><div style={{fontWeight:800,fontSize:16,color:C.blue,flex:1}}>{sel.id}</div><Badge label="✅ Đã giao" color={C.green} bg={C.greenLight}/><button onClick={()=>setSel(null)} style={{background:C.divider,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></div>
          <div style={{marginBottom:12}}><div style={{fontSize:11,color:C.textMuted}}>Khách hàng</div><div style={{fontWeight:800,fontSize:16,color:C.text}}>{sel.tenKH}</div><div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{fmtDate(sel.ngay)}</div></div>
          {sel.items?.map((it,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"8px 0",borderBottom:`1px solid ${C.divider}`}}><div><div style={{fontWeight:700,color:C.text}}>{it.ten}{it.ghiChu&&<span style={{fontSize:11,color:C.textMuted}}> 📝 {it.ghiChu}</span>}</div><div style={{color:C.textSec,fontSize:12}}>{fmt(it.gia)} × {it.sl}</div></div><div style={{fontWeight:800,color:C.blue}}>{fmt(it.gia*it.sl)}</div></div>))}
          <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",marginBottom:10}}><div><div style={{fontWeight:800,fontSize:16}}>Tổng tiền</div><div style={{fontSize:12,color:C.green,fontWeight:600}}>Lợi nhuận: +{fmt(sel.tongTien-sel.tongVon)}</div></div><div style={{fontWeight:900,fontSize:20,color:C.blue}}>{fmt(sel.tongTien)}</div></div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Btn onClick={async()=>{let orderToEdit=sel;if(api){try{const res=await api.get("getDonHang");if(res?.data){const fresh=res.data.find(o=>o.id===sel.id);if(fresh) orderToEdit=fresh;}}catch(e){}}onEditOrder(orderToEdit);setSel(null);}} color={C.blue} style={{flex:1}}>✏️ Sửa</Btn>
            <Btn onClick={()=>{setInvoiceOrder(sel);setSel(null);}} outline color={C.blue} style={{flex:1}}>🖨️ In</Btn>
            <Btn onClick={async()=>{if(!window.confirm("Xoá đơn "+sel.id+"?")) return;
              const isDone=sel.trangThai==="done";
              if(api){const res=await api.post("cancelOrder",{id:sel.id,maKH:sel.maKH||"",tenKH:sel.tenKH||"",tongTien:sel.tongTien||0,reversDebt:isDone&&sel.maKH!=="le"});if(res?.error) console.error("cancelOrder error:",res.error);}
              setOrders(os=>os.filter(o=>o.id!==sel.id));
              if(isDone&&sel.maKH!=="le"&&setDebts){setDebts(ds=>ds.filter(d=>d.maDon!==sel.id&&!(d.ghiChu||"").includes(sel.id)));}
              setSel(null);notify("✅ Đã xoá đơn!");}} outline color={C.red} style={{flex:1}}>🗑️ Xoá</Btn>
          </div>
        </Modal>
      )}
      <Toast msg={toast}/>
    </div>
  );
}
