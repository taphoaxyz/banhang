/* ── AUTOCOMPLETE KHÁCH HÀNG (dùng chung tab Bán + tab Nợ) ──── */
// walkIn: thêm lựa chọn "Khách lẻ" (id "le") ở đầu danh sách — dùng cho tab Bán
function AutocompleteKH({customers,value,onChange,placeholder="🔍 Tìm khách hàng...",walkIn=false,inputStyle={}}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ALL=walkIn?[{id:"le",ten:"Khách lẻ",username:"",avatar:""},...customers]:customers;
  const sel=ALL.find(k=>k.id===value)||(walkIn?ALL[0]:null);
  const filtered=ALL.filter(k=>!q||k.ten.toLowerCase().includes(q.toLowerCase())||(k.username||"").toLowerCase().includes(q.toLowerCase()));
  return(
    <div style={{position:"relative",flex:1,minWidth:0}}>
      <input value={open?q:(sel?sel.ten:"")} onChange={e=>{setQ(e.target.value);if(!open)setOpen(true);}}
        onFocus={()=>{setOpen(true);setQ("");}} onBlur={()=>setTimeout(()=>setOpen(false),200)}
        placeholder={placeholder}
        style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"none",fontSize:13,fontFamily:font,outline:"none",boxSizing:"border-box",...inputStyle}}/>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"white",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.18)",zIndex:200,maxHeight:220,overflowY:"auto"}}>
          {filtered.length===0&&<div style={{padding:"10px 12px",fontSize:13,color:C.textMuted}}>Không có khách</div>}
          {filtered.map(k=>(
            <div key={k.id} onMouseDown={()=>{onChange(k.id);setOpen(false);setQ("");}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",borderBottom:`1px solid ${C.divider}`,background:value===k.id?C.blueLight:"white"}}>
              {k.id==="le"?<span style={{fontSize:18,width:28,textAlign:"center"}}>👤</span>:<Avatar user={k} size={28}/>}
              <div><div style={{fontWeight:600,fontSize:13,color:C.text}}>{k.ten}</div>{k.username&&<div style={{fontSize:11,color:C.textMuted}}>@{k.username}</div>}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DebtTab({customers,debts,setDebts,api,role,currentUser}){
  const debtPrintRef=useRef(null);
  const debtShareRef=useRef(null);
  const [selKH,setSelKH]=useState("");const [amount,setAmount]=useState("");
  const [toast,setToast]=useState("");const [detail,setDetail]=useState(null);
  const [busyDebt,setBusyDebt]=useState(false);
  const isSeller=role==="seller";
  const notify=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const visibleDebts=isSeller?debts:debts.filter(d=>d.maKH===currentUser?.id);
  const debtMap=useMemo(()=>{
    const m={};
    visibleDebts.forEach(d=>{
      if(!m[d.maKH]) m[d.maKH]={maKH:d.maKH,ten:d.tenKH,total:0,last:d.ngay,items:[]};
      m[d.maKH].total+=(d.loai==="no"?d.soTien:-d.soTien);
      if(new Date(d.ngay)>new Date(m[d.maKH].last)) m[d.maKH].last=d.ngay;
      m[d.maKH].items.push(d);
    });
    return m;
  },[visibleDebts]);
  const allList=Object.values(debtMap).sort((a,b)=>Math.abs(b.total)-Math.abs(a.total));
  const oweList=allList.filter(d=>d.total>0);const creditList=allList.filter(d=>d.total<0);const clearList=allList.filter(d=>d.total===0);
  const tongNo=oweList.reduce((a,x)=>a+x.total,0);const tongDu=creditList.reduce((a,x)=>a+Math.abs(x.total),0);
  const addDebtFn=async(loai)=>{
    if(busyDebt) return;
    const amt=parseFloat(String(amount).replace(/[^0-9.]/g,""))||0;
    if(!selKH||amt<=0){notify("⚠️ Chọn KH và nhập số tiền!");return;}
    setBusyDebt(true);
    const kh=customers.find(c=>c.id===selKH);
    const d={id:genId("CN"),maKH:selKH,tenKH:kh?.ten||selKH,loai,soTien:amt,ngay:nowISO(),ghiChu:loai==="thu"?"Thu tiền":"Ghi nợ",maDon:""};
    if(api) await api.post("addDebt",d).catch(()=>{});
    setDebts(ds=>[d,...ds]);setAmount("");notify(loai==="thu"?"✅ Đã thu!":"✅ Đã ghi nợ!");setBusyDebt(false);
  };
  const addDebtFromDetail=async(loai)=>{
    if(busyDebt) return;
    const amt=parseFloat(String(detail.editAmount||0).replace(/[^0-9.]/g,""))||0;
    if(amt<=0){notify("⚠️ Nhập số tiền!");return;}
    setBusyDebt(true);
    const d={id:genId("CN"),maKH:detail.maKH,tenKH:detail.ten,loai,soTien:amt,ngay:nowISO(),ghiChu:loai==="thu"?"Thu tiền":"Ghi nợ",maDon:""};
    if(api) await api.post("addDebt",d).catch(()=>{});
    setDebts(ds=>[d,...ds]);
    setDetail(prev=>({...prev,total:prev.total+(loai==="no"?amt:-amt),items:[d,...prev.items],editAmount:""}));
    notify(loai==="thu"?"✅ Đã thu!":"✅ Đã ghi nợ!");setBusyDebt(false);
  };
  const DC=({d})=>{const isO=d.total>0,isC=d.total<0;const cust=customers.find(x=>x.id===d.maKH);return(
    <Card onClick={async()=>{
      let freshItems=d.items||[];
      if(api){try{const res=await api.get("getCongNo");if(res?.data) freshItems=res.data.filter(x=>x.maKH===d.maKH);}catch(e){}}
      const ct=freshItems.reduce((a,t)=>a+(t.loai==="no"?t.soTien:-t.soTien),0)||0;
      setDetail({...d,items:freshItems,editAmount:ct>0?String(Math.round(ct)):String(0),shopName:currentUser?.ten||''});
    }} style={{padding:"12px 14px",border:`1.5px solid ${isO?C.redLight:isC?"#bbf7d0":C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
          <Avatar user={{id:d.maKH,ten:d.ten,avatar:cust?.avatar||""}} size={40}/>
          <div style={{minWidth:0}}><div style={{fontWeight:800,fontSize:15,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.ten}</div><div style={{fontSize:12,color:C.textMuted}}>GD cuối: {fmtDate(d.last)}</div></div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          {isO&&<div style={{fontWeight:900,fontSize:15,color:C.red}}>{fmt(d.total)}</div>}
          {isC&&<div style={{fontWeight:900,fontSize:15,color:C.green}}>+{fmt(Math.abs(d.total))}</div>}
          {!isO&&!isC&&<div style={{fontSize:13,color:C.textMuted}}>✅</div>}
        </div>
      </div>
    </Card>
  );};
  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80,fontFamily:font}}>
      <div style={{background:`linear-gradient(135deg,${C.blue},${C.teal})`,padding:"16px 14px"}}>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <div style={{flex:1,background:"rgba(255,255,255,0.18)",borderRadius:14,padding:"10px 12px"}}><div style={{color:"rgba(255,255,255,0.8)",fontSize:11,fontWeight:700,marginBottom:2}}>⚠️ TỔNG NỢ</div><div style={{fontWeight:900,color:"white",fontSize:22,letterSpacing:-0.5}}>{fmt(tongNo)}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginTop:2}}>{oweList.length} khách còn nợ</div></div>
          {tongDu>0&&<div style={{flex:1,background:"rgba(255,255,255,0.18)",borderRadius:14,padding:"10px 12px"}}><div style={{color:"rgba(255,255,255,0.8)",fontSize:11,fontWeight:700,marginBottom:2}}>💚 TỔNG DƯ TIỀN</div><div style={{fontWeight:900,color:"white",fontSize:22,letterSpacing:-0.5}}>{fmt(tongDu)}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginTop:2}}>{creditList.length} khách dư</div></div>}
        </div>
        {isSeller&&<div style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"10px 12px"}}>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",fontWeight:700,marginBottom:8}}>⚡ LẬP PHIẾU NHANH</div>
          <AutocompleteKH customers={customers} value={selKH} onChange={id=>{setSelKH(id);if(id&&debtMap[id]&&debtMap[id].total>0) setAmount(String(debtMap[id].total));else setAmount("");}} placeholder="🔍 Tìm khách hàng..."/>
          <div style={{height:6}}/>
          <div style={{display:"flex",gap:8}}><MoneyInput value={amount} onChange={setAmount} placeholder="Số tiền..." style={{flex:1}}/><Btn onClick={()=>addDebtFn("thu")} color={C.green} disabled={busyDebt}>💵 Thu</Btn><Btn onClick={()=>addDebtFn("no")} color={C.red} disabled={busyDebt}>📌 Nợ</Btn></div>
        </div>}
      </div>
      <div style={{padding:"8px 12px",display:"flex",flexDirection:"column",gap:8}}>
        {oweList.length>0&&<><div style={{fontSize:11,color:C.textMuted,fontWeight:700,padding:"4px 2px",letterSpacing:0.5}}>⚠️ CÒN NỢ ({oweList.length})</div>{oweList.map(d=><DC key={d.maKH} d={d}/>)}</>}
        {creditList.length>0&&<><div style={{fontSize:11,color:C.green,fontWeight:700,padding:"8px 2px 4px",letterSpacing:0.5}}>💚 DƯ TIỀN ({creditList.length})</div>{creditList.map(d=><DC key={d.maKH} d={d}/>)}</>}
        {clearList.length>0&&<><div style={{fontSize:11,color:C.textMuted,fontWeight:700,padding:"8px 2px 4px",letterSpacing:0.5}}>✅ ĐÃ THANH TOÁN ({clearList.length})</div>{clearList.map(d=><DC key={d.maKH} d={d}/>)}</>}
        {allList.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted}}><div style={{fontSize:40}}>💰</div><div style={{fontWeight:600,marginTop:8}}>Chưa có công nợ</div></div>}
      </div>
      {detail&&(()=>{
        const shopName    = currentUser?.ten||"Cửa Hàng";
        const shopAvatar  = currentUser?.avatar||"";
        const computedTotal = detail.items.reduce((a,d)=>a+(d.loai==="no"?d.soTien:-d.soTien),0);
        const isOC=computedTotal>0, isCC=computedTotal<0;
        const sorted = [...detail.items].sort((a,b)=>new Date(a.ngay)-new Date(b.ngay));
        let running=0;
        const withBalance = sorted.map(t=>{
          running += t.loai==="no" ? t.soTien : -t.soTien;
          return {...t, balance:running};
        }).reverse();

        // Mô tả từng giao dịch — luôn hiện mã đơn nếu có
        const getDesc=(t)=>{
          return (t.ghiChu||t.maDon||"").trim();
        };

        const doShare=async()=>{
          if(!window.html2canvas||!debtShareRef.current) return;
          const canvas=await window.html2canvas(debtShareRef.current,{scale:2,useCORS:true,backgroundColor:"#fff"});
          canvas.toBlob(async(blob)=>{
            if(navigator.share&&navigator.canShare){
              const file=new File([blob],`no-${detail.ten}.jpg`,{type:"image/jpeg"});
              if(navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:"Công nợ "+detail.ten,text:"Quý khách vui lòng kiểm tra kỹ :mã ,tên hàng, số lượng, giá. Trước khi thanh toán!"});return;}catch(e){if(e.name==="AbortError") return;}}
            }
            const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`no-${detail.ten}.jpg`;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);
          },"image/jpeg",0.9);
        };

        // Layout receipt dùng chung cho modal và share
        const ReceiptContent=({forShare})=>(
          <div style={{background:"white",padding:"16px 12px",borderRadius:forShare?0:0}}>
            {/* Avatar + tên shop */}
            <div style={{textAlign:"center",marginBottom:10}}>
              <Avatar user={{id:"shop",ten:shopName,avatar:shopAvatar}} size={forShare?56:64} style={{margin:"0 auto 6px"}}/>
              <div style={{fontWeight:900,fontSize:forShare?16:18,color:C.blue}}>{shopName}</div>
              <div style={{borderBottom:"2px solid #222",margin:"8px 0"}}/>
            </div>
            {/* KH + tổng nợ */}
            <div style={{marginBottom:8}}>
              <div style={{fontSize:13,color:C.text,marginBottom:4}}>
                <b>KH: {detail.ten}</b> · {new Date().toLocaleDateString("vi")}
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                <span style={{fontWeight:900,fontSize:28,color:isOC?C.red:isCC?C.green:C.textMuted,letterSpacing:-0.5}}>
                  {fmt(Math.abs(computedTotal))}
                </span>
                <span style={{fontSize:12,fontWeight:700,color:isOC?C.red:isCC?C.green:C.textMuted}}>
                  {isOC?"⚠️ Còn nợ":isCC?"💚 Dư tiền":"✅ Đã xong"}
                </span>
              </div>
            </div>
            <div style={{borderTop:"1px dashed #aaa",marginBottom:6}}/>
            {/* Header bảng */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 72px 58px",fontSize:11,fontWeight:700,color:"#555",padding:"0 2px",marginBottom:4}}>
              <span>Giao dịch</span>
              <span style={{textAlign:"right"}}>Ngày</span>
              <span style={{textAlign:"right"}}>Số tiền</span>
            </div>
            <div style={{borderBottom:"1px dashed #aaa",marginBottom:4}}/>
            {/* Các dòng giao dịch */}
            {withBalance.map((t,i)=>{
              const isNo=t.loai==="no";
              return(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 72px 58px",padding:"7px 2px",borderBottom:"1px solid #f0f0f0",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:13,color:isNo?C.red:C.green}}>
                      {isNo?"📌 Ghi nợ":"💵 Thu tiền"}
                    </div>
                    <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{getDesc(t)}</div>
                  </div>
                  <div style={{textAlign:"right",fontSize:11,color:C.textMuted}}>{fmtDate(t.ngay)}</div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:800,fontSize:13,color:isNo?C.red:C.green}}>
                      {isNo?"+":"-"}{fmt(t.soTien)}
                    </div>
                    <div style={{fontSize:9,color:C.textMuted}}>
                      {t.balance>0?"Nợ ":"Dư "}<span style={{fontWeight:700,color:t.balance>0?C.red:C.green}}>{fmt(Math.abs(t.balance))}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );

        return(
          <Modal onClose={()=>setDetail(null)}>

/* ── APP ─────────────────────────────────────────────────────── */
function App(){
  const [scriptUrl,setScriptUrlRaw]=useState(()=>ls("scriptUrl","https://script.google.com/macros/s/AKfycbxwMxJvVNGJwxm4kPyp4JYUUWuor5xSkkm3whhSCgi9-gEJ78yAznQOZGza7oe54R-_/exec"));
  const setScriptUrl=(u)=>{setScriptUrlRaw(u);lsSet("scriptUrl",u);};
  const api=useMemo(()=>scriptUrl?createApi(scriptUrl):null,[scriptUrl]);
  const [userRaw,setUserRaw]=useState(()=>ls("session",null));
  const setUser=(u)=>{setUserRaw(u);if(u)lsSet("session",u);else localStorage.removeItem("session");};
  const user=userRaw;
  // Local mode: seed từ localStorage, fallback mock data để app chạy được khi chưa nối Google Sheets
  const [customers,setCustomers]=useState([]);
  const [products,setProducts]=useState([]);
  const [orders,setOrders]=useState([]);
  const [debts,setDebts]=useState([]);
  const [tab,setTab]=useState(()=>{const u=ls("session",null);return u?(u.loai==="seller"?"sell":"shop"):"";});const [allGsUsers,setAllGsUsers]=useState([]);
  const [loadingAccounts,setLoadingAccounts]=useState(false);const [editOrder,setEditOrder]=useState(null);
  const allUsers=useMemo(()=>{if(allGsUsers.length>0){const gsIds=new Set(allGsUsers.map(u=>u.id));const nc=customers.filter(c=>!gsIds.has(c.id));return [...allGsUsers,...nc];}return [SELLER,...customers];},[allGsUsers,customers]);
  useEffect(()=>{if(!api) return;setLoadingAccounts(true);api.get("getTaiKhoan").then(r=>{if(r?.data?.length){setAllGsUsers(r.data);const custs=r.data.filter(u=>u.loai==="customer").map(u=>({...u,avatar:u.avatar||avatarCache.get(u.id)||""}));custs.forEach(u=>{if(u.avatar) avatarCache.set(u.id,u.avatar);});setCustomers(custs);}}).catch(()=>{}).finally(()=>setLoadingAccounts(false));},[api]);
  useEffect(()=>{if(!api||!user) return;(async()=>{try{const [p,o,d]=await Promise.all([api.get("getSanPham"),api.get("getDonHang"),api.get("getCongNo")]);if(p?.data?.length) setProducts(p.data);if(o?.data?.length) setOrders(o.data);if(d?.data?.length) setDebts(d.data);}catch(e){console.error(e);}})();},[api,user?.id]);
  // Local mode: lưu thay đổi vào localStorage để không mất khi reload (chỉ khi chưa nối backend)
  
  
  
  
  const login=useCallback((u)=>{setUser(u);setTab(u.loai==="seller"?"sell":"shop");},[]);
  const logout=()=>{setUser(null);setTab("");};
  const updateUser=(updated)=>{setUser(updated);};
  const startEditOrder=(order)=>{setEditOrder(order);setTab("sell");};
  if(!user) return <Login allUsers={allUsers} onLogin={login} onSaveUrl={setScriptUrl} scriptUrl={scriptUrl} loadingAccounts={loadingAccounts}/>;
  if(user.loai==="seller") return(
    <div style={{maxWidth:"100%",minHeight:"100vh",fontFamily:font}}>
      <SellerTabs active={tab} onChange={setTab}/>
      {tab==="sell"&&<SellTab products={products} customers={customers} setOrders={setOrders} setDebts={setDebts} api={api} editOrder={editOrder} setEditOrder={setEditOrder}/>}
      {tab==="orders"&&<OrdersTab orders={orders} setOrders={setOrders} debts={debts} setDebts={setDebts} api={api} onEditOrder={startEditOrder} currentUser={user}/>}
      {tab==="debt"&&<DebtTab customers={customers} debts={debts} setDebts={setDebts} api={api} role="seller" currentUser={user}/>}
      {tab==="customers"&&<CustomersTab customers={customers} setCustomers={setCustomers} orders={orders} debts={debts} api={api}/>}
      {tab==="nguon"&&<NguonHangTab orders={orders} products={products} setOrders={setOrders} setDebts={setDebts} api={api} onEditOrder={startEditOrder}/>}
      {tab==="profile"&&<SellerProfile currentUser={user} onLogout={logout} onUpdateUser={updateUser} orders={orders} debts={debts} customers={customers} scriptUrl={scriptUrl} onSaveUrl={setScriptUrl} api={api}/>}
    </div>
  );
  return(
    <div style={{maxWidth:"100%",minHeight:"100vh",fontFamily:font}}>
      {tab==="shop"&&<ShopTab products={products} currentUser={user} setOrders={setOrders} api={api}/>}
      {tab==="orders"&&<MyOrdersTab orders={orders} currentUser={user}/>}
      {tab==="debt"&&<DebtTab customers={customers} debts={debts} setDebts={setDebts} api={api} role="customer" currentUser={user}/>}
      {tab==="profile"&&<CustomerProfile currentUser={user} onLogout={logout} onUpdateUser={updateUser} orders={orders} debts={debts} api={api}/>}
      <CustomerNav active={tab} onChange={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
